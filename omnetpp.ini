[General]
network = ChordNetwork
record-eventlog = false
cmdenv-express-mode = true

# N must match what is given in config.txt / topo.txt topology (default generated is 16)
*.N = 16

# ============================================================================
# EXECUTION MODE SELECTION
# ============================================================================
# This project supports TWO execution modes. Choose based on your environment:
#
# 1. COMMAND-LINE MODE (Cmdenv) - No GUI window
#    Use on headless systems (servers, VMs, WSL, headless Linux)
#    Command: ./ChordTaskNetwork -u Cmdenv
#
# 2. GUI MODE (Qtenv) - Visual simulation display
#    Use on machines with a display server (laptops, desktops with X11/Wayland)
#    Command: ./ChordTaskNetwork -u Qtenv
#    OR just: ./ChordTaskNetwork (will prompt to choose)
#
# To set a default preference (optional), add below:
# preferred-user-interface = Cmdenv
# OR
# preferred-user-interface = Qtenv
